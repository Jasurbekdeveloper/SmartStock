<!-- Headerni chaqirish -->
<app-header></app-header>

<!-- Asosiy qism -->
<div class="flex flex-col min-h-screen bg-gradient-to-br from-blue-500 to-blue-700 dark:from-blue-900 dark:to-blue-800">
  
  <!-- Formani markazga keltiruvchi konteyner -->
  <div class="flex-grow flex items-center justify-center p-4">
    <div class="bg-white dark:bg-gray-800 rounded-lg shadow-lg p-8 w-full max-w-md">
      <h1 class="text-3xl font-bold text-center mb-8 text-gray-800 dark:text-white">SmartStock</h1>

      <form (ngSubmit)="login()">
        <div class="mb-6">
          <label for="username" class="block text-gray-700 dark:text-gray-300 font-medium mb-2">
            {{ 'auth.username' | translate }}
          </label>
          <input id="username" type="text" [(ngModel)]="username" name="username" class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:border-blue-500" [placeholder]="'auth.enterUsername' | translate" />
        </div>

        <div class="mb-6">
          <label for="password" class="block text-gray-700 dark:text-gray-300 font-medium mb-2">
            {{ 'auth.password' | translate }}
          </label>
          <input id="password" type="password" [(ngModel)]="password" name="password" class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:border-blue-500" [placeholder]="'auth.enterPassword' | translate" />
        </div>

        @if (error()) {
        <div class="mb-6 p-4 bg-red-100 dark:bg-red-900 text-red-700 dark:text-red-300 rounded-lg">
          {{ error() }}
        </div>
        }

        <button type="submit" [disabled]="loading()" class="w-full bg-blue-600 dark:bg-blue-800 text-white font-medium py-2 rounded-lg hover:bg-blue-700 dark:hover:bg-blue-900 transition disabled:bg-gray-400 dark:disabled:bg-gray-600">
          {{ loading() ? ('messages.loading' | translate) : ('auth.loginButton' | translate) }}
        </button>
      </form>

      <p class="text-center text-gray-600 dark:text-gray-400 mt-6 text-sm">
        Demo: Use any username/password
      </p>
    </div>
  </div>
</div>
