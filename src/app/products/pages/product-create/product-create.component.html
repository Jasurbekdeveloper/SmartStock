<div class="max-w-2xl mx-auto">
  <h1 class="text-3xl font-bold mb-8 text-gray-900 dark:text-white">{{ 'form.createProduct' | translate }}</h1>

  <form (ngSubmit)="createProduct()" class="bg-white dark:bg-gray-800 rounded-lg shadow-md p-6 space-y-6">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div>
        <label class="block text-gray-700 dark:text-gray-300 font-medium mb-2">{{ 'form.productName' | translate }}</label>
        <input
          type="text"
          [(ngModel)]="product.name"
          name="name"
          class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:border-blue-500"
          [placeholder]="'form.enterProductName' | translate"
        />
      </div>

      <div>
        <label class="block text-gray-700 dark:text-gray-300 font-medium mb-2">{{ 'form.barcode' | translate }}</label>
        <input
          type="text"
          [(ngModel)]="product.barcode"
          name="barcode"
          class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:border-blue-500"
          [placeholder]="'form.enterBarcode' | translate"
        />
      </div>

      <div>
        <label class="block text-gray-700 dark:text-gray-300 font-medium mb-2">{{ 'form.price' | translate }}</label>
        <input
          type="number"
          [(ngModel)]="product.price"
          name="price"
          step="0.01"
          class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:border-blue-500"
          placeholder="0.00"
        />
      </div>

      <div>
        <label class="block text-gray-700 dark:text-gray-300 font-medium mb-2">{{ 'form.cost' | translate }}</label>
        <input
          type="number"
          [(ngModel)]="product.cost"
          name="cost"
          step="0.01"
          class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:border-blue-500"
          placeholder="0.00"
        />
      </div>

      <div>
        <label class="block text-gray-700 dark:text-gray-300 font-medium mb-2">{{ 'products.quantity' | translate }}</label>
        <input
          type="number"
          [(ngModel)]="product.quantity"
          name="quantity"
          class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:border-blue-500"
          placeholder="0"
        />
      </div>

      <div>
        <label class="block text-gray-700 dark:text-gray-300 font-medium mb-2">{{ 'products.category' | translate }}</label>
        <input
          type="text"
          [(ngModel)]="product.category"
          name="category"
          class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:border-blue-500"
          [placeholder]="'form.enterCategory' | translate"
        />
      </div>
    </div>

    <div>
      <label class="block text-gray-700 dark:text-gray-300 font-medium mb-2">{{ 'products.description' | translate }}</label>
      <textarea
        [(ngModel)]="product.description"
        name="description"
        class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:border-blue-500"
        rows="4"
        [placeholder]="'form.enterDescription' | translate"
      ></textarea>
    </div>

    <div class="flex gap-4">
      <button
        type="submit"
        class="bg-blue-600 dark:bg-blue-800 text-white px-6 py-2 rounded-lg hover:bg-blue-700 dark:hover:bg-blue-900 transition"
      >
        {{ 'form.createProduct' | translate }}
      </button>
      <a href="/products/list" class="bg-gray-400 dark:bg-gray-600 text-white px-6 py-2 rounded-lg hover:bg-gray-500 dark:hover:bg-gray-700 transition inline-block">
        {{ 'common.cancel' | translate }}
      </a>
    </div>
  </form>
</div>
