<div class="max-w-2xl mx-auto">
  @if (product) {
  <h1 class="text-3xl font-bold mb-8">Edit Product</h1>

  <form (ngSubmit)="updateProduct()" class="bg-white rounded-lg shadow-md p-6 space-y-6">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div>
        <label class="block text-gray-700 font-medium mb-2">Product Name</label>
        <input
          type="text"
          [(ngModel)]="product.name"
          name="name"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500"
        />
      </div>

      <div>
        <label class="block text-gray-700 font-medium mb-2">Barcode</label>
        <input
          type="text"
          [(ngModel)]="product.barcode"
          name="barcode"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500"
        />
      </div>

      <div>
        <label class="block text-gray-700 font-medium mb-2">Price</label>
        <input
          type="number"
          [(ngModel)]="product.price"
          name="price"
          step="0.01"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500"
        />
      </div>

      <div>
        <label class="block text-gray-700 font-medium mb-2">Cost</label>
        <input
          type="number"
          [(ngModel)]="product.cost"
          name="cost"
          step="0.01"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500"
        />
      </div>

      <div>
        <label class="block text-gray-700 font-medium mb-2">Quantity</label>
        <input
          type="number"
          [(ngModel)]="product.quantity"
          name="quantity"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500"
        />
      </div>

      <div>
        <label class="block text-gray-700 font-medium mb-2">Category</label>
        <input
          type="text"
          [(ngModel)]="product.category"
          name="category"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500"
        />
      </div>
    </div>

    <div class="flex gap-4">
      <button
        type="submit"
        class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition"
      >
        Update Product
      </button>
      <a href="/products/list" class="bg-gray-400 text-white px-6 py-2 rounded-lg hover:bg-gray-500 transition">
        Cancel
      </a>
    </div>
  </form>
  }
</div>
